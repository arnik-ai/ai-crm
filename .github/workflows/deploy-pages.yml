name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # ⚠️ false باشد نه true: کنسل‌کردنِ دیپلویِ Pages وسطِ کار، محیطِ github-pages را
  # خراب می‌کند و دیپلوی‌های بعدی fail می‌شوند. با false، دیپلوی‌ها صف می‌شوند و
  # هرکدام کامل اجرا می‌شوند (توصیه‌ی رسمیِ GitHub برای Pages).
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_OUTPUT: export
          NEXT_PUBLIC_BASE_PATH: /ai-crm
          # دمو خاموش + اتصال به بک‌اندِ واقعیِ روی سرور (https)
          NEXT_PUBLIC_DEMO: "0"
          NEXT_PUBLIC_API_BASE: https://141.11.187.126.sslip.io
      - run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          # مقاوم‌تر در برابرِ فلیکِ گذرای GitHub Pages: مهلتِ بیشتر + تحملِ خطاهای موقتیِ
          # بیشتر قبل از fail (تا ایمیلِ شکستِ الکی نیاید). build همیشه سالم است؛ فقط
          # مرحله‌ی انتشار گاهی سمتِ GitHub می‌لرزد.
          timeout: 900000
          error_count: 25
